<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Board Game Tracker</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#222222">
</head>

<body>

<div id="app-nav"></div>

<header>
    <h1>Board Game Tracker</h1>
</header>

<main>

    <section class="add-game">
        <input id="gameName" placeholder="Enter game name">
        <button onclick="createGame()">Add Game</button>
    </section>

    <section class="filters">
        <input type="text" id="searchInput" placeholder="Search by name or tag…" oninput="renderGames()">

        <select id="filterType" onchange="renderGames()">
            <option value="">Any type</option>
            <option value="coop">Co-op</option>
            <option value="versus">Versus</option>
        </select>

        <select id="filterLength" onchange="renderGames()">
            <option value="">Any length</option>
            <option value="30">30 min</option>
            <option value="60">60 min</option>
            <option value="90">90 min</option>
            <option value="120">120 min</option>
        </select>

        <select id="filterRating" onchange="renderGames()">
            <option value="">Any rating</option>
            <option value="S">S</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
            <option value="UP">UP</option>
        </select>

        <select id="filterTag" onchange="renderGames()">
            <option value="">All tags</option>
        </select>

        <select id="filterArchived" onchange="renderGames()">
            <option value="active" selected>Active only</option>
            <option value="archived">Archived only</option>
            <option value="all">All</option>
        </select>

        <select id="filterLastPlayed" onchange="renderGames()">
            <option value="">Any time</option>
            <option value="last-month">Played last month</option>
            <option value="last-2-months">Played last 2 months</option>
            <option value="ever">Played at all</option>
            <option value="never">Never played</option>
        </select>

        <button class="secondary" onclick="clearFilters()">Clear filters</button>
    </section>

    <section id="games"></section>

    <section class="toolbar">
        <button onclick="handleExport()">Export Data</button>
        <label class="import-btn">
            Import Data
            <input type="file" accept="application/json" onchange="handleImportFile(this)">
        </label>
    </section>

</main>

<script src="database.js"></script>
<script src="profile.js"></script>
<script src="nav.js"></script>
<script src="sync.js"></script>
<script src="image-picker.js"></script>
<script src="date-picker.js"></script>
<script src="game-editor.js"></script>
<script src="app.js"></script>

</body>

</html>
